name: EoS eBuild — CAD Product Simulation

# Runs the full power-budget simulation suite for all eCAD-Hardware-Products
# divisions at build time.  Triggered on every push to master/develop that
# touches the simulation tests or the eCAD product files, and nightly.

on:
  push:
    branches: [master, develop]
    paths:
      - 'tests/simulation/test_ecad_product_simulations.py'
      - 'scripts/run-ecad-simulations.py'
      - '.github/workflows/ecad-simulation.yml'
  pull_request:
    branches: [master]
    paths:
      - 'tests/simulation/**'
      - 'scripts/run-ecad-simulations.py'
  schedule:
    # Nightly at 02:00 UTC — full stack simulation run
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      division_filter:
        description: 'Simulate only this division (leave blank for all)'
        required: false
        default: ''
      with_ecad_checkout:
        description: 'Checkout eCAD-Hardware-Products for real file simulation'
        required: false
        default: 'true'

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ── Phase 1: Inline simulation (no external checkout needed) ─────────────
  inline-simulation:
    name: Inline CAD Simulation (39 products)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout eos-stack-manifest
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pytest
        run: pip install pytest pytest-cov

      - name: Run inline CAD product simulations
        run: |
          python -m pytest tests/simulation/test_ecad_product_simulations.py \
            -v --tb=short \
            --junitxml=output/sim/junit-ecad-inline.xml \
            2>&1 | tee output/sim/pytest_output.txt
        env:
          PYTHONPATH: .

      - name: Parse hardware coverage summary
        if: always()
        run: python3 scripts/parse-hardware-coverage.py output/sim/pytest_output.txt >> $GITHUB_STEP_SUMMARY

      - name: Upload simulation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ecad-inline-simulation-results
          path: output/sim/

  # ── Phase 2: Real-file simulation (with eCAD-Hardware-Products checkout) ─
  real-file-simulation:
    name: Real-file CAD Simulation (eCAD-Hardware-Products)
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.with_ecad_checkout != 'false' }}
    steps:
      - name: Checkout eos-stack-manifest
        uses: actions/checkout@v4

      - name: Checkout eCAD-Hardware-Products
        uses: actions/checkout@v4
        with:
          repository: embeddedos-org/eCAD-Hardware-Products
          token: ${{ secrets.GH_TOKEN || github.token }}
          path: eCAD-Hardware-Products

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run real-file CAD simulations
        run: |
          mkdir -p output/sim
          python3 scripts/run-ecad-simulations.py \
            --ecad-root eCAD-Hardware-Products \
            ${{ github.event.inputs.division_filter && format('--division {0}', github.event.inputs.division_filter) || '' }} \
            2>&1 | tee output/sim/real-sim-output.txt

      - name: Generate GitHub Step Summary
        if: always()
        run: |
          echo "## EmbeddedOS eBuild — Real-file CAD Simulation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python3 scripts/run-ecad-simulations.py \
            --ecad-root eCAD-Hardware-Products \
            --github-summary >> $GITHUB_STEP_SUMMARY 2>&1 || true

      - name: Upload simulation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ecad-real-simulation-results
          path: output/sim/

  # ── Phase 3: Build-time summary ──────────────────────────────────────────
  simulation-summary:
    name: Build-time Summary
    runs-on: ubuntu-latest
    needs: [inline-simulation, real-file-simulation]
    if: always()
    steps:
      - name: Print final status
        run: |
          echo "## EmbeddedOS eBuild — CAD Simulation Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Inline simulation (39 products) | ${{ needs.inline-simulation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Real-file simulation | ${{ needs.real-file-simulation.result }} |" >> $GITHUB_STEP_SUMMARY
