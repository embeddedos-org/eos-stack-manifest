name: EoS Unified Build, Test & Release

# ─────────────────────────────────────────────────────────────────────────────
# HOW FORK SUPPORT WORKS
# ─────────────────────────────────────────────────────────────────────────────
# 1. Fork this repo to any GitHub org (e.g. my-company/eos-stack-manifest)
# 2. Edit manifest-config.json → set "source_org" to your org name
#    OR set "override_org" to build from a completely different org
# 3. Push — the workflow reads source_org at runtime, never hardcodes it
#
# To build from the ORIGINAL embeddedos-org repos without forking those repos:
#   Set "source_org": "embeddedos-org" in manifest-config.json
#   Add GH_TOKEN secret with read access to embeddedos-org repos
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [master, develop]
    paths:
      - 'manifest.json'
      - 'build-matrix.json'
      - 'manifest-config.json'
      - '.github/workflows/unified-build.yml'
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      repo_filter:
        description: 'Build only this repo (leave blank for all)'
        required: false
        default: ''
      source_org_override:
        description: 'Override source org (leave blank to use manifest-config.json)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — discover only, no builds'
        required: false
        default: 'false'
      release:
        description: 'Create GitHub Releases for built artifacts'
        required: false
        default: 'false'
      tier:
        description: 'Build only this tier (1-5, leave blank for all)'
        required: false
        default: ''

permissions:
  contents: write
  packages: write
  pull-requests: read

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.12'
  GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}

jobs:

  # ── 1. Resolve source org & validate manifest ───────────────────────────────
  discover:
    name: Discover & Validate Manifest
    runs-on: ubuntu-latest
    outputs:
      source_org: ${{ steps.resolve-org.outputs.source_org }}
      matrix_firmware: ${{ steps.build-matrix.outputs.matrix_firmware }}
      matrix_python: ${{ steps.build-matrix.outputs.matrix_python }}
      matrix_web: ${{ steps.build-matrix.outputs.matrix_web }}
      total: ${{ steps.build-matrix.outputs.total }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install manifest deps
        run: npm install

      # ── Resolve which org to build from ─────────────────────────────────────
      # Priority: workflow_dispatch input > manifest-config.json override_org > manifest-config.json source_org
      - name: Resolve source org
        id: resolve-org
        run: |
          DISPATCH_ORG="${{ github.event.inputs.source_org_override }}"
          CONFIG_OVERRIDE=$(node -e "
            const c = JSON.parse(require('fs').readFileSync('manifest-config.json','utf8'));
            console.log(c.override_org || '');
          ")
          SOURCE_ORG=$(node -e "
            const c = JSON.parse(require('fs').readFileSync('manifest-config.json','utf8'));
            console.log(c.source_org || 'embeddedos-org');
          ")

          if [ -n "$DISPATCH_ORG" ]; then
            FINAL_ORG="$DISPATCH_ORG"
            echo "Using workflow_dispatch override: $FINAL_ORG"
          elif [ -n "$CONFIG_OVERRIDE" ]; then
            FINAL_ORG="$CONFIG_OVERRIDE"
            echo "Using manifest-config.json override_org: $FINAL_ORG"
          else
            FINAL_ORG="$SOURCE_ORG"
            echo "Using manifest-config.json source_org: $FINAL_ORG"
          fi

          echo "source_org=$FINAL_ORG" >> $GITHUB_OUTPUT
          echo "SOURCE_ORG=$FINAL_ORG" >> $GITHUB_ENV

      - name: Run auto-discovery (dry-run)
        run: node scripts/discover.mjs --dry-run
        env:
          GH_TOKEN: ${{ env.GH_TOKEN }}
          SOURCE_ORG: ${{ steps.resolve-org.outputs.source_org }}

      - name: Validate manifest schema
        run: node scripts/validate-schema.mjs

      - name: Build dynamic job matrices
        id: build-matrix
        run: |
          FILTER="${{ github.event.inputs.repo_filter }}"
          TIER="${{ github.event.inputs.tier }}"
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('manifest.json','utf8'));
            const matrix = JSON.parse(fs.readFileSync('build-matrix.json','utf8'));

            // Filter by tier if specified
            const tierFilter = '$TIER';
            const repoFilter = '$FILTER';

            let allRepos = manifest.repos || [];
            if (tierFilter) {
              allRepos = allRepos.filter(r => String(r.tier) === tierFilter);
            }
            if (repoFilter) {
              allRepos = allRepos.filter(r => r.name === repoFilter);
            }

            const firmware = allRepos.filter(r => ['firmware','rtos'].includes(r.platform)).map(r => r.name);
            const python   = allRepos.filter(r => r.stack === 'python').map(r => r.name);
            const web      = allRepos.filter(r => ['web','electron'].includes(r.stack)).map(r => r.name);

            console.log('matrix_firmware=' + JSON.stringify({ include: firmware.map(r => ({ repo: r })) }));
            console.log('matrix_python='   + JSON.stringify({ include: python.map(r => ({ repo: r })) }));
            console.log('matrix_web='      + JSON.stringify({ include: web.map(r => ({ repo: r })) }));
            console.log('total=' + allRepos.length);
          " >> $GITHUB_OUTPUT

      - name: Print manifest stats
        run: node scripts/stats.mjs

      - name: Print fork info
        run: |
          echo "============================================"
          echo "  EoS Stack Manifest — Fork Info"
          echo "============================================"
          echo "  Manifest repo  : ${{ github.repository }}"
          echo "  Source org     : ${{ steps.resolve-org.outputs.source_org }}"
          echo "  Triggered by   : ${{ github.event_name }}"
          echo "  Ref            : ${{ github.ref }}"
          echo "============================================"
          echo ""
          echo "  To build from a different org, either:"
          echo "  1. Set 'override_org' in manifest-config.json"
          echo "  2. Pass 'source_org_override' in workflow_dispatch"
          echo "============================================"

  # ── 2. Firmware / C / CMake builds ─────────────────────────────────────────
  build-firmware:
    name: Build Firmware — ${{ matrix.repo }}
    needs: discover
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.dry_run != 'true' }}
    strategy:
      fail-fast: false
      matrix:
        repo: [eos, eBoot, eAI, eosllm, ebuild, eNI, HEALTH-BAND-Neuro]
    steps:
      - name: Checkout ${{ matrix.repo }} from ${{ needs.discover.outputs.source_org }}
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.discover.outputs.source_org }}/${{ matrix.repo }}
          token: ${{ env.GH_TOKEN }}
          ref: master

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake build-essential gcc-arm-none-eabi binutils-arm-none-eabi \
            openssl libssl-dev ninja-build

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -G Ninja || cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j$(nproc)

      - name: Test
        run: cmake --build build --target test || echo "No test target defined"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.repo }}
          path: |
            build/**/*.elf
            build/**/*.hex
            build/**/*.bin
            build/**/*.a
            build/**/*.so
          if-no-files-found: warn
          retention-days: 30

  # ── 3. Python / Backend builds ─────────────────────────────────────────────
  build-python:
    name: Build Python — ${{ matrix.repo }}
    needs: discover
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.dry_run != 'true' }}
    strategy:
      fail-fast: false
      matrix:
        repo: [eDB, EoSim, EoStudio, eVera]
    steps:
      - name: Checkout ${{ matrix.repo }} from ${{ needs.discover.outputs.source_org }}
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.discover.outputs.source_org }}/${{ matrix.repo }}
          token: ${{ env.GH_TOKEN }}
          ref: master

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt 2>/dev/null || echo "No requirements.txt"
          pip install pytest pytest-cov pyinstaller 2>/dev/null || true

      - name: Run tests
        run: pytest --tb=short -q 2>/dev/null || echo "No tests found"

      - name: Build binary (PyInstaller)
        run: |
          SPEC=$(ls *.spec 2>/dev/null | head -1)
          if [ -n "$SPEC" ]; then
            # Create any missing directories referenced in the spec
            # (e.g. data/ may be gitignored but referenced in datas)
            grep -oP "'[^']+',\s*'[^']+'\.?" "$SPEC" 2>/dev/null | \
              grep -oP "^'\K[^']+" | while read src; do
                [ ! -e "$src" ] && mkdir -p "$src" && echo "Created missing: $src"
              done
            # Also create common dirs that specs reference
            for d in data models cache logs; do
              [ -d "$d" ] || mkdir -p "$d"
            done
            pyinstaller "$SPEC" || echo "PyInstaller build failed (non-fatal)"
          else
            echo "No .spec file — skipping PyInstaller build"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-${{ matrix.repo }}
          path: dist/
          if-no-files-found: warn
          retention-days: 30

  # ── 4. Go builds ────────────────────────────────────────────────────────────
  build-go:
    name: Build Go — eIPC
    needs: discover
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.dry_run != 'true' }}
    steps:
      - name: Checkout eIPC from ${{ needs.discover.outputs.source_org }}
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.discover.outputs.source_org }}/eIPC
          token: ${{ env.GH_TOKEN }}
          ref: master

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Test
        run: go test ./... -v -count=1 || echo "No tests"

      - name: Build (Linux, Windows, macOS)
        run: |
          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -o dist/eipc-linux-amd64   ./cmd/... 2>/dev/null || go build -o dist/eipc-linux-amd64   . 2>/dev/null || echo "Build skipped"
          GOOS=windows GOARCH=amd64 go build -o dist/eipc-windows-amd64.exe ./cmd/... 2>/dev/null || true
          GOOS=darwin  GOARCH=arm64 go build -o dist/eipc-macos-arm64   ./cmd/... 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: go-eIPC
          path: dist/
          if-no-files-found: warn
          retention-days: 30

  # ── 5. Node / TypeScript / Web builds ──────────────────────────────────────
  build-web:
    name: Build Web — ${{ matrix.repo }}
    needs: discover
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.dry_run != 'true' }}
    strategy:
      fail-fast: false
      matrix:
        repo: [eApps, www.embeddedos.org, eOffice, HealthKey-Ulta]
    steps:
      - name: Checkout ${{ matrix.repo }} from ${{ needs.discover.outputs.source_org }}
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.discover.outputs.source_org }}/${{ matrix.repo }}
          token: ${{ env.GH_TOKEN }}
          ref: master

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # No cache: npm here — target repos may not have package-lock.json

      - name: Install
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f yarn.lock ]; then
            yarn install --frozen-lockfile
          elif [ -f package.json ]; then
            npm install
          else
            echo "No package.json found — skipping install"
          fi

      - name: Test
        run: npm test -- --passWithNoTests 2>/dev/null || echo "No tests"

      - name: Build
        run: npm run build 2>/dev/null || echo "No build script"

      - uses: actions/upload-artifact@v4
        with:
          name: web-${{ matrix.repo }}
          path: |
            dist/
            build/
            out/
          if-no-files-found: warn
          retention-days: 30

  # ── 6. Hardware / KiCad builds ─────────────────────────────────────────────
  build-hardware:
    name: Build Hardware — eCAD
    needs: discover
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.dry_run != 'true' }}
    steps:
      - name: Checkout eCAD-Hardware-Products from ${{ needs.discover.outputs.source_org }}
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.discover.outputs.source_org }}/eCAD-Hardware-Products
          token: ${{ env.GH_TOKEN }}
          ref: master

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install KiCad tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y kicad python3-kicad 2>/dev/null || echo "KiCad not available in CI — skipping"
          pip install kicad-python 2>/dev/null || true

      - name: Run DRC checks
        run: python3 scripts/drc_check.py 2>/dev/null || echo "DRC script not found"

      - name: Generate Gerbers
        run: python3 scripts/generate_gerbers.py 2>/dev/null || echo "Gerber script not found"

      - uses: actions/upload-artifact@v4
        with:
          name: hardware-eCAD
          path: |
            gerbers/
            output/
            bom/
          if-no-files-found: warn
          retention-days: 30

  # ── 7. Manifest auto-update ─────────────────────────────────────────────────
  update-manifest:
    name: Auto-Update Manifest
    needs: discover
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.dry_run == 'false'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ env.GH_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm install

      - name: Run auto-discovery (live update)
        run: node scripts/discover.mjs
        env:
          GH_TOKEN: ${{ env.GH_TOKEN }}
          SOURCE_ORG: ${{ needs.discover.outputs.source_org }}

      - name: Commit manifest updates
        run: |
          git config user.email "eos-bot@embeddedos.org"
          git config user.name "EoS Manifest Bot"
          git diff --quiet manifest.json build-matrix.json || (
            git add manifest.json build-matrix.json
            git commit -m "chore: auto-update manifest [$(date -u +%Y-%m-%d)] from ${{ needs.discover.outputs.source_org }}"
            git push
          )

  # ── 8. Release (on v* tag) ──────────────────────────────────────────────────
  release:
    name: Create Unified Release
    needs:
      - build-firmware
      - build-python
      - build-go
      - build-web
      - build-hardware
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm install

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Generate release notes
        run: node scripts/generate-release-docs.mjs
        env:
          GH_TOKEN: ${{ env.GH_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
          SOURCE_ORG: ${{ needs.discover.outputs.source_org }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "EoS Stack ${{ github.ref_name }} (source: ${{ needs.discover.outputs.source_org }})"
          body_path: RELEASE.md
          files: |
            release-artifacts/**/*.elf
            release-artifacts/**/*.hex
            release-artifacts/**/*.bin
            release-artifacts/**/*.a
            release-artifacts/**/*.so
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.deb
            release-artifacts/**/*.dmg
            release-artifacts/**/*.exe
            release-artifacts/**/*.apk
            release-artifacts/**/*.vsix
            release-artifacts/**/*.zip
            manifest.json
            build-matrix.json
            manifest-config.json
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
        env:
          GITHUB_TOKEN: ${{ env.GH_TOKEN }}
