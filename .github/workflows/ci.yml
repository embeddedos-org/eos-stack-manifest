name: CI — eFab

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  # ── Test Matrix ───────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-22.04, macos-13, windows-2022]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-benchmark mypy ruff

      - name: Lint (ruff)
        run: ruff check . --select=E,F,W --ignore=E501
        continue-on-error: true

      - name: Type check (mypy)
        run: mypy . --ignore-missing-imports --no-strict-optional
        continue-on-error: true

      - name: Run unit tests
        run: |
          python -m pytest tests/unit/ -v --tb=short \
            --cov=. --cov-report=xml --cov-report=term-missing

      - name: Run functional tests
        run: python -m pytest tests/functional/ -v --tb=short
        continue-on-error: false

      - name: Run performance benchmarks
        run: python -m pytest tests/performance/ -v --tb=short --benchmark-json=benchmark.json
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: efab-py${{ matrix.python-version }}

  # ── Build Python Package ──────────────────────────────────────────────────
  build:
    name: Build Python Package
    runs-on: ubuntu-22.04
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel
        run: |
          pip install build
          python -m build
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: efab-wheel
          path: dist/*.whl
          retention-days: 90

  # ── Release ───────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    needs: [test, build]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build release package
        run: |
          pip install build
          python -m build
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
